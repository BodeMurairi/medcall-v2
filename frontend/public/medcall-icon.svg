<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="110" height="110" role="img" aria-label="MedCall icon">
  <defs>
    <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#14C9AE"/>
      <stop offset="100%" stop-color="#08967F"/>
    </linearGradient>
    <filter id="gw" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sh" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6"
                   flood-color="#0CB8A0" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Rounded square -->
  <rect x="0" y="0" width="110" height="110" rx="26"
        fill="url(#ig)" filter="url(#sh)"/>

  <!-- Depth overlay -->
  <rect x="0" y="68" width="110" height="42" rx="0"
        fill="#096F60" opacity="0.22"/>
  <rect x="0" y="88" width="110" height="22" rx="0"
        fill="#096F60" opacity="0.18"/>

  <!-- M-ECG pulse line -->
  <polyline
    points="10,58  18,58  26,24  34,92  42,58  52,58  60,24  68,92  76,58  92,58"
    stroke="white" stroke-width="5.5" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#gw)"/>

  <!-- Location dot rings + core -->
  <circle cx="102" cy="58" r="14" fill="none"
          stroke="rgba(255,255,255,0.20)" stroke-width="2.5"/>
  <circle cx="102" cy="58" r="9"  fill="none"
          stroke="rgba(255,255,255,0.38)" stroke-width="2"/>
  <circle cx="102" cy="58" r="5"  fill="white"/>
</svg>
