<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" width="520" height="130" role="img" aria-label="MedCall logo">
  <defs>
    <!-- Icon gradient: teal top-left → deep teal bottom-right -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#14C9AE"/>
      <stop offset="100%" stop-color="#08967F"/>
    </linearGradient>

    <!-- Glow filter for pulse line -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft drop shadow for icon box -->
    <filter id="boxShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6"
                   flood-color="#0CB8A0" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- ════════════════════════════════════════════════════════
       ICON MARK  (110 × 110, centered vertically at y=10)
       ════════════════════════════════════════════════════════ -->

  <!-- Rounded square base -->
  <rect x="0" y="10" width="110" height="110" rx="26"
        fill="url(#iconGrad)" filter="url(#boxShadow)"/>

  <!-- Inner dark overlay at bottom for depth -->
  <rect x="0" y="75" width="110" height="45" rx="0"
        fill="#096F60" opacity="0.22"/>
  <rect x="0" y="95" width="110" height="25" rx="0 0 26 26"
        fill="#096F60" opacity="0.18"/>

  <!-- ── M-shaped ECG / Pulse line ─────────────────────── -->
  <!--
    Two ECG spikes whose peaks trace the shape of the letter M.
    Peak 1: x≈30  Peak 2: x≈60  then long flat tail → location dot
  -->
  <polyline
    points="10,65  20,65  28,28  36,102  44,65  54,65  62,28  70,102  78,65  94,65"
    stroke="white" stroke-width="5.8" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- ── Location-pin dot at end of pulse ──────────────── -->
  <!-- Outer pulse ring -->
  <circle cx="100" cy="65" r="15" fill="none"
          stroke="rgba(255,255,255,0.22)" stroke-width="2.5"/>
  <!-- Mid ring -->
  <circle cx="100" cy="65" r="9.5" fill="none"
          stroke="rgba(255,255,255,0.40)" stroke-width="2"/>
  <!-- Solid dot -->
  <circle cx="100" cy="65" r="5.5" fill="white"/>

  <!-- ════════════════════════════════════════════════════════
       WORDMARK
       ════════════════════════════════════════════════════════ -->

  <!-- "MED" in deep navy -->
  <text x="128" y="75"
        font-family="'Barlow Condensed', 'Arial Narrow', 'Impact', Arial, sans-serif"
        font-size="54" font-weight="800" letter-spacing="1.5"
        fill="#15253D">MED</text>

  <!-- "CALL" in teal -->
  <text x="248" y="75"
        font-family="'Barlow Condensed', 'Arial Narrow', 'Impact', Arial, sans-serif"
        font-size="54" font-weight="800" letter-spacing="1.5"
        fill="#0CB8A0">CALL</text>

  <!-- Thin teal accent rule under wordmark -->
  <rect x="128" y="82" width="60" height="3.5" rx="2" fill="#0CB8A0"/>

  <!-- Tagline -->
  <text x="129" y="102"
        font-family="'Inter', 'Open Sans', Helvetica, Arial, sans-serif"
        font-size="11.5" font-weight="600" letter-spacing="4"
        fill="#1E3A5F">HEALTHCARE NAVIGATION</text>
</svg>
