<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" width="520" height="130" role="img" aria-label="MedCall logo – dark variant">
  <defs>
    <linearGradient id="iconGradD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#14C9AE"/>
      <stop offset="100%" stop-color="#08967F"/>
    </linearGradient>
    <filter id="glowD" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boxShadowD" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7"
                   flood-color="#000000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <!-- Dark background pill -->
  <rect x="0" y="0" width="520" height="130" rx="0" fill="#0A1628"/>

  <!-- Icon mark -->
  <rect x="14" y="10" width="110" height="110" rx="26"
        fill="url(#iconGradD)" filter="url(#boxShadowD)"/>
  <rect x="14" y="75" width="110" height="45" rx="0"
        fill="#096F60" opacity="0.22"/>
  <rect x="14" y="95" width="110" height="25" rx="0"
        fill="#096F60" opacity="0.18"/>

  <!-- M-ECG pulse line -->
  <polyline
    points="24,65  34,65  42,28  50,102  58,65  68,65  76,28  84,102  92,65  108,65"
    stroke="white" stroke-width="5.8" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glowD)"/>

  <!-- Location dot -->
  <circle cx="116" cy="65" r="15" fill="none"
          stroke="rgba(255,255,255,0.20)" stroke-width="2.5"/>
  <circle cx="116" cy="65" r="9.5" fill="none"
          stroke="rgba(255,255,255,0.38)" stroke-width="2"/>
  <circle cx="116" cy="65" r="5.5" fill="white"/>

  <!-- Wordmark – white + teal on dark bg -->
  <text x="146" y="75"
        font-family="'Barlow Condensed', 'Arial Narrow', 'Impact', Arial, sans-serif"
        font-size="54" font-weight="800" letter-spacing="1.5"
        fill="#FFFFFF">MED</text>
  <text x="266" y="75"
        font-family="'Barlow Condensed', 'Arial Narrow', 'Impact', Arial, sans-serif"
        font-size="54" font-weight="800" letter-spacing="1.5"
        fill="#0CB8A0">CALL</text>

  <rect x="146" y="82" width="60" height="3.5" rx="2" fill="#0CB8A0"/>

  <text x="147" y="102"
        font-family="'Inter', 'Open Sans', Helvetica, Arial, sans-serif"
        font-size="11.5" font-weight="600" letter-spacing="4"
        fill="#7AA8C8">HEALTHCARE NAVIGATION</text>
</svg>
